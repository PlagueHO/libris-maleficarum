name: Lint and Publish Bicep

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: write

jobs:
  build-armtemplates:
    name: Lint and Publish Bicep
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Bicep
        run: |
          az bicep install
          az bicep version

      - name: Lint Bicep
        run: |
          for attempt in 1 2 3 4 5; do
            if az bicep lint --file ./infra/main.bicep; then
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Bicep lint failed after 5 attempts."
              exit 1
            fi

            echo "Bicep lint failed on attempt $attempt, retrying in 10 seconds..."
            sleep 10
          done

      - name: Publish Bicep as Workflow Artifact
        uses: actions/upload-artifact@v7
        with:
          name: infrastructure_bicep
          path: |
            ./infra/main.bicep
            ./infra/main.bicepparam
            ./infra/*.json
            ./infra/**/*
