name: Provision Infrastructure

on:
  workflow_call:
    inputs:
      ENVIRONMENT:
        description: "The environment to validate the application infrastructure for"
        required: true
        type: string
      BUILD_VERSION:
        description: "The version of the build to deploy to the application resources"
        required: true
        type: string
      AZURE_LOCATION:
        description: "The Azure region to deploy the application resources to"
        required: true
        type: string
      AZURE_ENV_NAME:
        description: "The name of the Azure environment"
        required: true
        type: string
      AZURE_STATIC_WEB_APP_LOCATION:
        description: "The Azure region for the Static Web App (must be one of: centralus, eastasia, eastus2, westeurope, westus2)"
        required: false
        type: string
        default: ''

    outputs:
      AZURE_RESOURCE_GROUP:
        description: "The Azure resource group name"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_RESOURCE_GROUP }}
      AZURE_STATIC_WEB_APP_NAME:
        description: "The Azure Static Web App resource name"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_STATIC_WEB_APP_NAME }}
      AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME:
        description: "The default hostname of the deployed Azure Static Web App"
        value: ${{ jobs.provision-infrastructure.outputs.AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME }}

    secrets:
      AZURE_TENANT_ID:
        description: "The Azure tenant ID to use for authentication to Azure for deployment"
        required: true
      AZURE_SUBSCRIPTION_ID:
        description: "The Azure subscription ID to use for authentication to Azure for deployment"
        required: true
      AZURE_CLIENT_ID:
        description: "The Azure client ID to use for authentication to Azure for deployment"
        required: true
      ACCESS_CODE:
        description: "Optional access code for API protection in single-user mode"
        required: false

jobs:
  provision-infrastructure:
    name: Provision Infrastructure ${{ inputs.ENVIRONMENT }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}
    permissions:
      id-token: write
      contents: read
    env:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_ENV_NAME: ${{ vars.AZURE_ENV_NAME || inputs.AZURE_ENV_NAME }}
      AZURE_LOCATION: ${{ inputs.AZURE_LOCATION }}
      AZURE_STATIC_WEB_APP_LOCATION: ${{ inputs.AZURE_STATIC_WEB_APP_LOCATION }}
      AZURE_PRINCIPAL_ID_TYPE: "ServicePrincipal"

    outputs:
      AZURE_RESOURCE_GROUP: ${{ steps.get_endpoints.outputs.AZURE_RESOURCE_GROUP }}
      AZURE_STATIC_WEB_APP_NAME: ${{ steps.get_endpoints.outputs.AZURE_STATIC_WEB_APP_NAME }}
      AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME: ${{ steps.get_endpoints.outputs.AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: latest

      - name: Install Azure Developer CLI
        uses: Azure/setup-azd@v2.2.1

      - name: Authenticate Azure Developer CLI (Federated Credentials)
        run: |
          azd auth login \
            --client-id "$AZURE_CLIENT_ID" \
            --federated-credential-provider "github" \
            --tenant-id "$AZURE_TENANT_ID"

      - name: Authenticate Azure CLI (Federated Credentials)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Create Azure Developer CLI environment
        run: |
          azd env new "$AZURE_ENV_NAME" --location "$AZURE_LOCATION"

      - name: Set Azure Developer CLI environment variables
        run: |
          azd env set AZURE_PRINCIPAL_ID_TYPE "$AZURE_PRINCIPAL_ID_TYPE"
          azd env set AZURE_RESOURCE_GROUP "rg-${AZURE_ENV_NAME}"
          if [ -n "$AZURE_STATIC_WEB_APP_LOCATION" ]; then
            azd env set AZURE_STATIC_WEB_APP_LOCATION "$AZURE_STATIC_WEB_APP_LOCATION"
          fi
          if [ -n "${{ secrets.ACCESS_CODE }}" ]; then
            azd env set ACCESS_CODE "${{ secrets.ACCESS_CODE }}"
          fi
      - name: Provision Infrastructure using Azure Developer CLI
        id: provision
        continue-on-error: true
        run: azd provision --no-prompt

      - name: Fail if Provision Failed
        if: steps.provision.outcome == 'failure'
        run: |
          echo "::error::Infrastructure provisioning failed. Cleanup is handled by the delete-infrastructure workflow."
          exit 1

      - name: Get Output Endpoints
        id: get_endpoints
        run: |
          AZURE_RESOURCE_GROUP="rg-${AZURE_ENV_NAME}"
          echo "AZURE_RESOURCE_GROUP=$AZURE_RESOURCE_GROUP" >> $GITHUB_OUTPUT

          # Get Static Web App name from the resource group
          AZURE_STATIC_WEB_APP_NAME=$(az staticwebapp list --resource-group "$AZURE_RESOURCE_GROUP" --query "[0].name" -o tsv)
          echo "AZURE_STATIC_WEB_APP_NAME=$AZURE_STATIC_WEB_APP_NAME" >> $GITHUB_OUTPUT

          # Get default hostname of the Static Web App
          AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME=$(az staticwebapp show --name "$AZURE_STATIC_WEB_APP_NAME" --resource-group "$AZURE_RESOURCE_GROUP" --query "defaultHostname" -o tsv)
          echo "AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME=$AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME" >> $GITHUB_OUTPUT
