name: Continuous Delivery

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - infra/**
      - libris-maleficarum-app/**
      - libris-maleficarum-service/**

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  set-build-variables:
    name: Set Build Variables
    uses: ./.github/workflows/set-build-variables.yml

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml

  build-and-publish-frontend-app:
    name: Build and Publish Frontend App
    uses: ./.github/workflows/build-and-publish-frontend-app.yml

  build-and-publish-backend-service:
    needs:
      - set-build-variables

    name: Build and Publish Backend Service
    uses: ./.github/workflows/build-and-publish-backend-service.yml
    with:
      push-to-ghcr: true
      image-tag: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      build-version: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}

  e2e-test-v1:
    needs:
      - set-build-variables

    name: E2E Test
    uses: ./.github/workflows/e2e-test.yml
    with:
      ENVIRONMENT: test
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ENV_NAME: ${{ format('libmal-{0}', github.run_id) }}
      AZURE_STATIC_WEB_APP_LOCATION: ${{ vars.AZURE_STATIC_WEB_APP_LOCATION }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ────────────────────────────────────────────────────────────────────────────
  # Production deployment — only runs on v* tag pushes, after E2E tests pass.
  # Uses a static environment name (libris-maleficarum-prod) for idempotent deployments.
  # ────────────────────────────────────────────────────────────────────────────

  validate-prod-infrastructure:
    name: Validate Prod Infrastructure
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - set-build-variables
      - e2e-test-v1
    uses: ./.github/workflows/validate-infrastructure.yml
    with:
      ENVIRONMENT: prod
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ENV_NAME: libris-maleficarum-prod
      AZURE_STATIC_WEB_APP_LOCATION: ${{ vars.AZURE_STATIC_WEB_APP_LOCATION }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  provision-prod-infrastructure:
    name: Provision Prod Infrastructure
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - set-build-variables
      - validate-prod-infrastructure
    uses: ./.github/workflows/provision-infrastructure.yml
    with:
      ENVIRONMENT: prod
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION }}
      AZURE_ENV_NAME: libris-maleficarum-prod
      AZURE_STATIC_WEB_APP_LOCATION: ${{ vars.AZURE_STATIC_WEB_APP_LOCATION }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  deploy-prod-frontend:
    name: Deploy Prod Frontend
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - provision-prod-infrastructure
    uses: ./.github/workflows/deploy-frontend-app.yml
    permissions:
      id-token: write
      contents: read
    with:
      ENVIRONMENT: prod
      AZURE_RESOURCE_GROUP: ${{ needs.provision-prod-infrastructure.outputs.AZURE_RESOURCE_GROUP }}
      AZURE_STATIC_WEB_APP_NAME: ${{ needs.provision-prod-infrastructure.outputs.AZURE_STATIC_WEB_APP_NAME }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  smoke-test-prod:
    name: Smoke Test Prod
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - provision-prod-infrastructure
      - deploy-prod-frontend
    uses: ./.github/workflows/smoke-test.yml
    permissions:
      checks: write
      contents: read
    with:
      AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME: ${{ needs.provision-prod-infrastructure.outputs.AZURE_STATIC_WEB_APP_DEFAULT_HOSTNAME }}
