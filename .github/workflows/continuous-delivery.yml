name: Continuous Delivery

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths:
      - infra/**
      - libris-maleficarum-app/**
      - libris-maleficarum-service/**

  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  checks: write
  pull-requests: write
  packages: write

jobs:
  set-build-variables:
    name: Set Build Variables
    uses: ./.github/workflows/set-build-variables.yml

  lint-and-publish-bicep:
    name: Lint and Publish Bicep
    uses: ./.github/workflows/lint-and-publish-bicep.yml

  build-and-publish-frontend-app:
    name: Build and Publish Frontend App
    uses: ./.github/workflows/build-and-publish-frontend-app.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write

  build-and-publish-backend-service:
    needs:
      - set-build-variables

    name: Build and Publish Backend Service
    uses: ./.github/workflows/build-and-publish-backend-service.yml
    permissions:
      contents: read
      checks: write
      pull-requests: write
      packages: write
    with:
      push-to-ghcr: true
      image-tag: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      build-version: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}

  e2e-test-v1:
    needs:
      - set-build-variables
      - lint-and-publish-bicep
      - build-and-publish-frontend-app
      - build-and-publish-backend-service

    name: E2E Test
    uses: ./.github/workflows/e2e-test.yml
    with:
      ENVIRONMENT: test
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
      AZURE_ENV_NAME: ${{ format('libmal-{0}', github.run_id) }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

  # ────────────────────────────────────────────────────────────────────────────
  # Production deployment — only runs on v* tag pushes, after E2E tests pass.
  # Delegates to deploy-production.yml for validate, provision, deploy & smoke.
  # ────────────────────────────────────────────────────────────────────────────

  deploy-production:
    name: Deploy Production
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - set-build-variables
      - e2e-test-v1
    uses: ./.github/workflows/deploy-production.yml
    permissions:
      id-token: write
      contents: read
      checks: write
    with:
      BUILD_VERSION: ${{ needs.set-build-variables.outputs.BUILD_VERSION }}
      AZURE_LOCATION: ${{ vars.AZURE_LOCATION || 'eastus2' }}
    secrets:
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ACCESS_CODE: ${{ secrets.ACCESS_CODE }}
